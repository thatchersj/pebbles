<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pebbles' Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #c5bbb1;
            font-family: 'Indie Flower', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            margin: 0;
        }
        h1 { font-size: 3.5rem; color: #4e342e; margin-bottom: 40px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1000px;
        }
        .book-card {
            background: #5d4037;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-align: center;
            transition: transform 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #fdfaf3;
        }
        .book-card:hover { transform: translateY(-10px); }
        .book-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .book-card h2 { margin: 10px 0; font-size: 1.8rem; }

        /* Landscape Mobile Fix for Library */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 20px; /* Reduce padding to save space */
            }

            h1 {
                font-size: 2rem; /* Shrink title */
                margin-bottom: 20px;
            }

            .grid {
                grid-template-columns: repeat(2, minmax(180px, 1fr)); /* More, smaller columns */
                gap: 20px;
            }

            .book-card {
                padding: 10px;
                display: flex; /* Switch to horizontal card layout */
                align-items: center;
                text-align: left;
            }

            .book-card img {
                height: 120px; /* Much smaller height for landscape */
                width: 90px;   /* Fixed width to keep it consistent */
                margin-bottom: 0;
                margin-right: 15px;
            }

            .book-card h2 {
                font-size: 1.2rem;
                margin: 0;
            }

            .book-card p {
                font-size: 0.9rem;
                margin: 5px 0 0 0;
            }
        }
    </style>
</head>
<body>
    <h1>My Storybook Library</h1>
    <div class="grid" id="library-grid">
    </div>

    <script>
    async function initLibrary() {
        const grid = document.getElementById('library-grid');
        
        try {
            // 1. Fetch the master list of books
            const manifestResponse = await fetch('books/index.json');
            const manifest = await manifestResponse.json();

            // 2. Load Real Books
            for (const bookFileName of manifest.availableBooks) {
                const bookResponse = await fetch(`books/${bookFileName}`);
                const bookData = await bookResponse.json();
                
                grid.innerHTML += `
                    <a href="book.html?book=books/${bookFileName}" class="book-card">
                        <img src="${bookData.coverImage}" alt="${bookData.title}">
                        <div><h2>${bookData.title}</h2>
                        <p>${bookData.author}</p></div>
                    </a>`;
            }

            // 3. Load Placeholder Books
            manifest.placeholders.forEach(placeholder => {
                grid.innerHTML += `
                    <div class="book-card placeholder">
                        <img src="${placeholder.coverImage}" alt="${placeholder.title}" style="filter: grayscale(0.5);">
                        <h2>${placeholder.title}</h2>
                        <p>${placeholder.status}</p>
                    </div>`;
            });

        } catch (err) {
            console.error("Library failed to load:", err);
        }
    }

    initLibrary();
    </script>
</body>
</html>
